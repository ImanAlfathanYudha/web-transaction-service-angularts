<h1>CSV Viewer App</h1>
<upload-component></upload-component>
<app-transaction-summary></app-transaction-summary>
<p *ngIf="error" class="error">
  ❌ {{ error }}
</p>
<div *ngIf="transactions.length > 0 && !loading; else empty">
  <p>Successful Transaction</p>
  <app-table-transaction></app-table-transaction>
</div>
<p *ngIf="loading">⏳ Uploading & fetching data...</p>
<ng-template #empty>
  <p>No data yet. Upload CSV first.</p>
</ng-template>
