<h2>Pending Transactions</h2>

<table>
  <thead>
    <tr>
      <th>Timestamp</th>
      <th>Name</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Description</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    <ng-container *ngIf="paginatedPendingTransactions.length > 0; else empty">
      <tr *ngFor="let t of paginatedPendingTransactions">
        <td>{{ t.timestamp }}</td>
        <td>{{ t.name }}</td>
        <td>{{ t.amount }}</td>
        <td class="statusPending">{{ t.status }}</td>
        <td>{{t.description}}</td>
        <td>
          <button (click)="markAsSuccess(t.timestamp)">
            ✅ Mark as Success
          </button>
        </td>
      </tr>
    </ng-container>
  </tbody>

  <ng-template #empty>
    <tr>
      <td colspan="6" style="text-align:center;">
        No data available. Please upload CSV.
      </td>
    </tr>
  </ng-template>
</table>

<div class="pagination">
  <div class="page-size">
    <label>Show:</label>

    <select (change)="onPageSizeChange($any($event.target).value)">
      <option value="5">5</option>
      <option value="10">10</option>
      <option value="20">20</option>
    </select>

    <span>items per page</span>
    <!-- tombol sebelumnya -->
    <button (click)="prevPage()" [disabled]="currentPage === 1">
      ⬅ Prev
    </button>

    <!-- info halaman -->
    <span>
      Page {{ currentPage }} / {{ totalPages }}
    </span>

    <!-- tombol berikutnya -->
    <button (click)="nextPage()" [disabled]="currentPage === totalPages">
      Next ➡
    </button>
  </div>
</div>
