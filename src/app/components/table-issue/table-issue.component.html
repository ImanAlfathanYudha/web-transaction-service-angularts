<h2>Failed Transactions</h2>
<table>
  <thead>
    <tr>
      <th>Timestamp</th>
      <th>Name</th>
      <th>Status</th>
      <th>Description</th>
    </tr>
  </thead>

  <tbody>
    <ng-container *ngIf="paginatedIssuesTransactions.length > 0; else empty">
      <tr *ngFor="let i of paginatedIssuesTransactions">
        <td>{{ i.timestamp }}</td>
        <td>{{ i.name }}</td>
        <td>{{ i.status }}</td>
        <td>{{ i.description }}</td>
      </tr>
    </ng-container>
  </tbody>
  <ng-template #empty>
    <tr>
      <td colspan="6" style="text-align:center;">
        No data available. Please upload CSV.
      </td>
    </tr>
  </ng-template>
</table>

<div class="pagination">
  <div class="page-size">
    <label>Show:</label>

    <select (change)="onPageSizeChange($any($event.target).value)">
      <option value="5">5</option>
      <option value="10">10</option>
      <option value="20">20</option>
    </select>

    <span>items per page</span>
    <!-- tombol sebelumnya -->
    <button (click)="prevPage()" [disabled]="currentPage === 1">
      ⬅ Prev
    </button>

    <!-- info halaman -->
    <span>
      Page {{ currentPage }} / {{ totalPages }}
    </span>

    <!-- tombol berikutnya -->
    <button (click)="nextPage()" [disabled]="currentPage === totalPages">
      Next ➡
    </button>
  </div>
</div>
