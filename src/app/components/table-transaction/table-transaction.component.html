<table>
  <thead>
    <tr>
      <th>Timestamp</th>
      <th>Name</th>
      <th>Type</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Description</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let t of paginatedTransactions">
      <td>{{ t.timestamp }}</td>
      <td>{{ t.name }}</td>
      <td>{{ t.type }}</td>
      <td>{{ t.amount }}</td>

      <td [ngClass]="t.status === 'SUCCESS' ? 'statusSuccess' : 'statusPending'">
        {{ t.status === 'SUCCESS' ? '✅' : '⏳' }} {{ t.status }}
      </td>

      <td>{{ t.description }}</td>
    </tr>
  </tbody>
</table>
<div class="pagination">

  <!-- tombol sebelumnya -->
  <button (click)="prevPage()" [disabled]="currentPage === 1">
    ⬅ Prev
  </button>

  <!-- info halaman -->
  <span>
    Page {{ currentPage }} / {{ totalPages }}
  </span>

  <!-- tombol berikutnya -->
  <button (click)="nextPage()" [disabled]="currentPage === totalPages">
    Next ➡
  </button>

</div>
